version: '3.8'

services:
  api:
    image: product-template-api
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
      tempo:
        condition: service_started
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__HostDb=Server=sqlserver,1433;Database=ProductTemplateHost;User Id=sa;Password=YourStrong!Pass123;TrustServerCertificate=True;MultipleActiveResultSets=True;Encrypt=False
      - ConnectionStrings__AppDb=Server=sqlserver,1433;Database=ProductTemplateApp;User Id=sa;Password=YourStrong!Pass123;TrustServerCertificate=True;MultipleActiveResultSets=True;Encrypt=False
      - MultiTenancy__Provider=SqlServer
      # OpenTelemetry — aponta traces para o Grafana Tempo dentro da rede Docker
      - OpenTelemetry__OtlpTracesEndpoint=http://tempo:4317
      - OpenTelemetry__OtlpEndpoint=http://tempo:4317
      # Serilog — Seq dentro da rede Docker
      - Serilog__WriteTo__2__Args__serverUrl=http://seq:80
    ports:
      - "8080:8080"
    networks:
      - product-template-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: product-template-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Pass123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - product-template-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Pass123" -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  seq:
    image: datalust/seq:latest
    container_name: product-template-seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data
    networks:
      - product-template-network

  # ─── Grafana Tempo (armazenamento de traces distribuídos via OTLP) ───────
  tempo:
    image: grafana/tempo:latest
    container_name: product-template-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API (Grafana datasource)
      - "4317:4317"   # OTLP gRPC receiver (API envia traces aqui)
      - "4318:4318"   # OTLP HTTP receiver
    networks:
      - product-template-network

  # ─── Prometheus (coleta métricas scraping do endpoint /metrics da API) ───
  prometheus:
    image: prom/prometheus:latest
    container_name: product-template-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'   # habilita remote write do Tempo
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api
    networks:
      - product-template-network

  # ─── Grafana (dashboard de métricas + traces integrados) ─────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: product-template-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
    networks:
      - product-template-network

networks:
  product-template-network:
    driver: bridge

volumes:
  sqlserver_data:
  seq_data:
  tempo_data:
  prometheus_data:
  grafana_data:
