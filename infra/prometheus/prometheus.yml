global:
  scrape_interval: 15s       # scrape a cada 15 segundos
  evaluation_interval: 15s   # avaliar regras a cada 15 segundos
  external_labels:
    environment: 'development'
    project: 'product-template'

# Alertas (opcional — apontar para Alertmanager se configurado)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:
  # ─────────────────────────────────────────────
  # API .NET — expõe /metrics via OTEL Prometheus
  # ─────────────────────────────────────────────
  - job_name: 'product-template-api'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8080']
        labels:
          service: 'api'
          team: 'backend'

  # ─────────────────────────────────────────────
  # Prometheus auto-monitoramento
  # ─────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

