name: Validate Template

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Template Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --no-restore --configuration Release

    - name: Run unit, integration and architecture tests
      run: dotnet test --no-build --configuration Release --verbosity normal
        --collect:"XPlat Code Coverage"
        --results-directory ./coverage
        --ignore-filter "FullyQualifiedName~E2ETests"

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: ./coverage

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: validate

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --no-restore --configuration Release

    - name: Run E2E tests (Testcontainers / Docker)
      run: dotnet test tests/E2ETests/E2ETests.csproj --no-build --configuration Release --verbosity normal

  test-template-installation:
    name: Test Template Installation
    runs-on: ubuntu-latest
    needs: validate

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install template locally
      run: dotnet new install .

    - name: List installed templates
      run: dotnet new list | grep product-template

    - name: Create test project from template
      run: dotnet new product-template -n TestProject -o ./test-output

    - name: Restore test project
      run: dotnet restore ./test-output

    - name: Build test project
      run: dotnet build ./test-output --configuration Release

    - name: Run test project tests
      run: dotnet test ./test-output --configuration Release --verbosity normal

    - name: Uninstall template
      run: dotnet new uninstall Neuraptor.Product.Template

    - name: Cleanup test output
      run: rm -rf ./test-output

  check-code-style:
    name: Check Code Style
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Format check
      run: dotnet format --verify-no-changes --verbosity diagnostic

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Run security audit
      run: |
        dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerable.txt
        if grep -q "has the following vulnerable packages" vulnerable.txt; then
          echo "Vulnerable packages found!"
          exit 1
        fi

  build-matrix:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal
        --ignore-filter "FullyQualifiedName~E2ETests"
